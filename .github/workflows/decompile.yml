name: Build License Class

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      
      - name: Download Spigot API
        run: |
          wget -O spigot-api.jar "https://hub.spigotmc.org/nexus/content/repositories/snapshots/org/spigotmc/spigot-api/1.20.4-R0.1-SNAPSHOT/spigot-api-1.20.4-R0.1-20231115.030351-43.jar"
      
      - name: Create License.java
        run: |
          mkdir -p me/gerhart/antivpn/license
          cat > me/gerhart/antivpn/license/License.java << 'EOF'
          // PASTE TOÀN BỘ CODE TRÊN VÀO ĐÂY
          EOF
      
      - name: Compile
        run: |
          javac -cp ".:spigot-api.jar" me/gerhart/antivpn/license/License.java
          ls -la me/gerhart/antivpn/license/
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: license-class
          path: me/gerhart/antivpn/license/License.class
