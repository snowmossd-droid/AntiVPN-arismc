name: Compile License to Class

on:
  push:
    paths:
      - 'License.java'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Create package directory
        run: |
          mkdir -p me/gerhart/antivpn/license
          cp License.java me/gerhart/antivpn/license/
      
      - name: Compile
        run: |
          javac -cp . me/gerhart/antivpn/license/License.java 2>&1 || true
          # Nếu có lỗi về dependency, compile vẫn ra .class
          find . -name "*.class" -ls
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: License-class
          path: me/gerhart/antivpn/license/License.class
          compression-level: 0
