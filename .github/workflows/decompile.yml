name: Decompile JAR

on:
  push:
    paths:
      - '*.jar'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  decompile:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Download CFR
        run: wget -O cfr.jar https://github.com/leibnitz27/cfr/releases/download/0.152/cfr-0.152.jar
      
      - name: Create directories
        run: mkdir -p src/main/java src/main/resources
      
      - name: Decompile
        run: java -jar cfr.jar Anti-VPN-3.jar --outputdir ./src/main/java/
      
      - name: Extract resources
        run: |
          unzip -q Anti-VPN-3.jar -d temp/
          find temp -type f ! -name "*.class" -exec cp --parents {} src/main/resources/ \; 2>/dev/null || true
          rm -rf temp
      
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/
          git diff --staged --quiet || git commit -m "Decompile JAR"
          git push || true
      
      - uses: actions/upload-artifact@v4
        with:
          name: source
          path: src/
