name: Build License Class

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Download Bukkit/Spigot API
        run: |
          # Tải Paper API (thay thế cho Spigot)
          wget -O paper-api.jar https://api.papermc.io/v2/projects/paper/versions/1.20.4/builds/418/downloads/paper-1.20.4-418-api.jar
          # Hoặc dùng Spigot API
          wget -O spigot-api.jar https://hub.spigotmc.org/nexus/content/repositories/snapshots/org/spigotmc/spigot-api/1.20.4-R0.1-SNAPSHOT/spigot-api-1.20.4-R0.1-20231115.030351-43.jar || true
      
      - name: Create directory and compile
        run: |
          # Tạo đúng cấu trúc package
          mkdir -p me/gerhart/antivpn/license
          cp License.java me/gerhart/antivpn/license/
          
          # Compile với classpath
          javac -cp ".:paper-api.jar:spigot-api.jar" me/gerhart/antivpn/license/License.java 2>&1 || true
          
          # Kiểm tra file đã được tạo chưa
          find . -name "*.class" -ls
      
      - name: Upload License.class
        uses: actions/upload-artifact@v4
        with:
          name: license-class
          path: me/gerhart/antivpn/license/License.class
          retention-days: 90
