          # Kiểm tra file đã tải thành công chưa
          if [ -f paper-api.jar ]; then
            echo "✓ Paper API downloaded successfully"
            ls -la paper-api.jar
          else
            echo "❌ Failed to download Paper API"
            exit 1
          fi

