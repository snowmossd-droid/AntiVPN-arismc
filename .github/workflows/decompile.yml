name: Compile License.java with Paper API 1.21

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download Paper API 1.21 using Maven
        run: |
          # Tạo một pom.xml tạm thời để tải Paper API
          cat > pom.xml << 'EOF'
          <project>
            <modelVersion>4.0.0</modelVersion>
            <groupId>temp</groupId>
            <artifactId>temp</artifactId>
            <version>1.0</version>
            <repositories>
              <repository>
                <id>papermc</id>
                <url>https://repo.papermc.io/repository/maven-public/</url>
              </repository>
            </repositories>
            <dependencies>
              <dependency>
                <groupId>io.papermc.paper</groupId>
                <artifactId>paper-api</artifactId>
                <version>1.21-R0.1-SNAPSHOT</version>
                <scope>system</scope>
                <systemPath>${project.basedir}/paper-api.jar</systemPath>
              </dependency>
            </dependencies>
          </project>
          EOF
          
          # Dùng Maven để tải dependency
          mvn dependency:copy -Dartifact="io.papermc.paper:paper-api:1.21-R0.1-SNAPSHOT" -DoutputDirectory=.
          
          # Đổi tên file đã tải
          mv paper-api-*.jar paper-api.jar 2>/dev/null || echo "File may have different name"
          
          # Kiểm tra xem file đã được tải chưa
          if [ -f paper-api.jar ]; then
            echo "✓ Paper API 1.21 downloaded successfully"
            ls -la paper-api.jar
          else
            echo "❌ Failed to download Paper API 1.21"
            exit 1
          fi

      - name: Setup directory and patch License.java
        run: |
          # Tạo đúng cấu trúc package
          mkdir -p me/gerhart/antivpn/license
          
          # Sao chép file License.java từ thư mục gốc
          cp License.java me/gerhart/antivpn/license/ 2>/dev/null || echo "License.java not in root, searching..."
          
          # Tìm file License.java trong toàn bộ repo nếu chưa tìm thấy
          if [ ! -f "me/gerhart/antivpn/license/License.java" ]; then
            find . -name "License.java" -exec cp {} me/gerhart/antivpn/license/ \;
          fi
          
          # Patch file License.java để luôn trả về true
          cat > me/gerhart/antivpn/license/License.java << 'EOF'
