name: Compile License.java with Paper API 1.21

on:
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: Download Paper API 1.21
        run: |
          # Tải Paper API 1.21 (phiên bản 1.21, không phải 1.21.3)
          wget -O paper-api.jar "https://repo.papermc.io/repository/maven-public/io/papermc/paper/paper-api/1.21-R0.1-SNAPSHOT/paper-api-1.21-R0.1-20240619.115036-86.jar"
          
          # Nếu link trên lỗi, thử link này
          if [ ! -f paper-api.jar ]; then
            wget -O paper-api.jar "https://repo.papermc.io/repository/maven-public/io/papermc/paper/paper-api/1.21-R0.1-SNAPSHOT/paper-api-1.21-R0.1-20240613.200822-79.jar"
          fi
          
          # Nếu vẫn lỗi, thử link cuối cùng
          if [ ! -f paper-api.jar ]; then
            wget -O paper-api.jar "https://repo.papermc.io/repository/maven-public/io/papermc/paper/paper-api/1.21-R0.1-SNAPSHOT/paper-api-1.21-R0.1-20240608.160007-67.jar"
          fi
          
          ls -la paper-api.jar
      
      - name: Create directory structure
        run: |
          # Tạo đúng cấu trúc package
          mkdir -p me/gerhart/antivpn/license
          
          # Copy License.java từ thư mục gốc vào đúng package
          cp License.java me/gerhart/antivpn/license/ 2>/dev/null || echo "License.java not in root"
          
          # Nếu không tìm thấy, tìm trong toàn bộ repo
          find . -name "License.java" -exec cp {} me/gerhart/antivpn/license/ \;
          
          echo "=== License.java content ==="
          cat me/gerhart/antivpn/license/License.java | head -30
      
      - name: Compile License.java
        run: |
          # Biên dịch với Paper API 1.21
          javac -cp ".:paper-api.jar" me/gerhart/antivpn/license/License.java
          
          # Kiểm tra kết quả
          if [ -f "me/gerhart/antivpn/license/License.class" ]; then
            echo "✓ Compilation successful!"
            ls -la me/gerhart/antivpn/license/License.class
          else
            echo "❌ Compilation failed!"
            exit 1
          fi
      
      - name: Upload License.class
        uses: actions/upload-artifact@v4
        with:
          name: license-class-paper-1.21
          path: me/gerhart/antivpn/license/License.class
          retention-days: 90
