name: Build License Class

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Create directory structure
        run: |
          # Tạo đúng cấu trúc package
          mkdir -p me/gerhart/antivpn/license
          # Copy file License.java từ thư mục gốc vào đúng package
          cp License.java me/gerhart/antivpn/license/ || echo "License.java not in root, searching..."
          # Nếu file ở chỗ khác, tìm nó
          find . -name "License.java" -exec cp {} me/gerhart/antivpn/license/ \;
      
      - name: Compile License.java
        run: |
          cd me/gerhart/antivpn/license
          # Compile file
          javac License.java 2>&1
          echo "=== Compiled ==="
          ls -la License.class
          cd ../..
      
      - name: Upload License.class
        uses: actions/upload-artifact@v4
        with:
          name: license-class
          path: me/gerhart/antivpn/license/License.class
          retention-days: 90
